name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Syntax check all source files
        run: |
          for f in src/*.js; do
            node --check "$f"
          done

      - name: Run tests
        run: npm test

  deploy-site:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Base64 encode all website pages and CSS
          INDEX_B64=$(base64 -w0 website/index.html)
          HOW_B64=$(base64 -w0 website/how-it-works.html)
          FEATURES_B64=$(base64 -w0 website/features.html)
          FAQ_B64=$(base64 -w0 website/faq.html)
          PRICING_B64=$(base64 -w0 website/pricing.html)
          CSS_B64=$(base64 -w0 website/styles.css)
          # Keep old style.css for backwards compat
          CSS_OLD_B64=$(base64 -w0 website/style.css 2>/dev/null || echo "$CSS_B64")

          # Build worker script — pages inlined, assets fetched from GitHub
          node -e "
          const pages = {
            '/': '${INDEX_B64}',
            '/index.html': '${INDEX_B64}',
            '/how-it-works.html': '${HOW_B64}',
            '/features.html': '${FEATURES_B64}',
            '/faq.html': '${FAQ_B64}',
            '/pricing.html': '${PRICING_B64}',
            '/styles.css': '${CSS_B64}',
            '/style.css': '${CSS_OLD_B64}',
          };
          const types = { '.html': 'text/html;charset=UTF-8', '.css': 'text/css;charset=UTF-8' };
          const script = \`
          const PAGES = \${JSON.stringify(pages)};
          const REPO = 'codedrop-codes/refactory';
          const BRANCH = 'main';
          addEventListener('fetch', e => e.respondWith(handleRequest(e.request)));
          async function handleRequest(request) {
            const url = new URL(request.url);
            let p = url.pathname;
            if (p.endsWith('/') && p !== '/') p = p.slice(0, -1);
            const page = PAGES[p];
            if (page) {
              const ext = p.includes('.css') ? 'text/css;charset=UTF-8' : 'text/html;charset=UTF-8';
              return new Response(atob(page), { headers: { 'Content-Type': ext, 'Cache-Control': 'public, max-age=3600' } });
            }
            if (p.startsWith('/assets/') || p === '/og-image.png' || p === '/og-image.svg') {
              const ghUrl = 'https://raw.githubusercontent.com/' + REPO + '/' + BRANCH + '/website' + p;
              const resp = await fetch(ghUrl, { cf: { cacheTtl: 86400, cacheEverything: true } });
              if (resp.ok) return new Response(resp.body, {
                headers: { 'Content-Type': resp.headers.get('Content-Type') || 'application/octet-stream', 'Cache-Control': 'public, max-age=86400' }
              });
            }
            return new Response('Not found', { status: 404 });
          }
          \`;
          require('fs').writeFileSync('/tmp/worker.js', script);
          "

          # Deploy to Cloudflare
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/refactory-site" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/javascript" \
            --data-binary @/tmp/worker.js

          echo "Deployed refactory-site worker"
