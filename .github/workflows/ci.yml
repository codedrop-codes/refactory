name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Syntax check all source files
        run: |
          for f in src/*.js; do
            node --check "$f"
          done

      - name: Run tests
        run: npm test

  deploy-site:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Base64 encode website files
          HTML_B64=$(base64 -w0 website/index.html)
          CSS_B64=$(base64 -w0 website/style.css)

          # Build worker script with inlined content
          cat > /tmp/worker.js << 'EOF'
          const ASSETS = {
            "/": { body: "__HTML__", type: "text/html;charset=UTF-8" },
            "/index.html": { body: "__HTML__", type: "text/html;charset=UTF-8" },
            "/style.css": { body: "__CSS__", type: "text/css;charset=UTF-8" },
          };
          const REPO = "codedrop-codes/refactory";
          const BRANCH = "main";
          addEventListener("fetch", event => { event.respondWith(handleRequest(event.request)); });
          async function handleRequest(request) {
            const url = new URL(request.url);
            const asset = ASSETS[url.pathname];
            if (asset) {
              return new Response(atob(asset.body), {
                headers: { "Content-Type": asset.type, "Cache-Control": "public, max-age=86400" },
              });
            }
            if (url.pathname.startsWith("/assets/")) {
              const ghUrl = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/website${url.pathname}`;
              const resp = await fetch(ghUrl, { cf: { cacheTtl: 86400, cacheEverything: true } });
              if (resp.ok) return new Response(resp.body, {
                headers: { "Content-Type": resp.headers.get("Content-Type") || "application/octet-stream", "Cache-Control": "public, max-age=86400" },
              });
            }
            return new Response("Not found", { status: 404 });
          }
          EOF

          # Inject base64 content
          sed -i "s|__HTML__|${HTML_B64}|g" /tmp/worker.js
          sed -i "s|__CSS__|${CSS_B64}|g" /tmp/worker.js

          # Deploy to Cloudflare
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/refactory-site" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/javascript" \
            --data-binary @/tmp/worker.js

          echo "Deployed refactory-site worker"
